<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>របាយការណ៍ថវិកាបំប៉នខែមីនា</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Khmer+OS+Siemreap&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header id="app-header">
            <img src="logo.png" alt="School Logo" class="logo">
            <h1>របាយការណ៍ថវិកាបំប៉ន</h1>
            <p class="subtitle">ខែមីនា ឆ្នាំសិក្សា២០២៥-២០២៦</p>
        </header>

        <main id="main-content">
            <section id="home-section" class="page active">
                <div class="summary-grid">
                    <div class="card">
                        <span class="label">គ្រូសរុប</span>
                        <span class="value" id="total-teachers">...</span>
                    </div>
                    <div class="card">
                        <span class="label">ថវិកាសរុប</span>
                        <span class="value" id="total-budget">...</span>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab-btn active" onclick="switchData('teachers')">ទិន្នន័យគ្រូ</button>
                    <button class="tab-btn" onclick="switchData('students')">ទិន្នន័យសិស្ស</button>
                </div>

                <div id="data-display">
                    <div class="table-responsive" id="teacher-table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ឈ្មោះគ្រូ</th>
                                    <th>សិស្ស</th>
                                    <th>សរុប</th>
                                    <th>៨០%</th>
                                </tr>
                            </thead>
                            <tbody id="teacher-body"></tbody>
                        </table>
                    </div>
                    <div id="student-container" style="display:none;"></div>
                </div>
            </section>

            <section id="account-section" class="page">
                <div class="profile-card">
                    <div class="profile-icon"><i class="fas fa-user-circle"></i></div>
                    <h2>ហម ម៉ាលីនដា</h2>
                    <p>អ្នកបង្កើតកម្មវិធី</p>
                    <hr>
                    <div class="contact-info">
                        <div class="info-item">
                            <i class="fas fa-phone"></i>
                            <span>017 751 115</span>
                        </div>
                        <a href="https://t.me/MalindaHorm" target="_blank" class="info-item link">
                            <i class="fab fa-telegram"></i>
                            <span>t.me/MalindaHorm</span>
                        </a>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showPage('home', this)">
                <i class="fas fa-home"></i><span>ដើម</span>
            </div>
            <div class="nav-item" onclick="showPage('account', this)">
                <i class="fas fa-user"></i><span>គណនី</span>
            </div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
