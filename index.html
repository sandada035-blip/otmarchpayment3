<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>របាយការណ៍ថវិកា - ម៉ាលីនដា</title>
    <link href="https://fonts.googleapis.com/css2?family=Khmer+OS+Siemreap&family=Freehand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <section id="home-page" class="page active">
            <header class="main-header">
                <div class="header-content">
                    <img src="logo.png" alt="Logo" class="app-logo">
                    <div class="header-text">
                        <h2>របាយការណ៍ថវិកាបំប៉ន</h2>
                        <p>ខែមីនា ឆ្នាំសិក្សា២០២៥-២០២៦</p>
                    </div>
                </div>
            </header>

            <div class="container">
                <div class="stats-row">
                    <div class="stat-card">
                        <i class="fas fa-users-rectangle"></i>
                        <span id="total-teachers">...</span>
                        <label>គ្រូសរុប</label>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-money-bill-trend-up"></i>
                        <span id="total-budget">...</span>
                        <label>ថវិកាសរុប</label>
                    </div>
                </div>

                <div class="content-card">
                    <div class="tab-bar">
                        <button class="tab-item active" onclick="switchContent('teachers', this)">
                            <i class="fas fa-chalkboard-teacher"></i> គ្រូបង្រៀន
                        </button>
                        <button class="tab-item" onclick="switchContent('students', this)">
                            <i class="fas fa-user-graduate"></i> សិស្ស
                        </button>
                    </div>
                    <div class="search-container">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="search-input" placeholder="ស្វែងរកឈ្មោះគ្រូ ឬសិស្ស..." oninput="handleSearch()">
</div>
                    <div id="data-list" class="fade-in">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="profile-page" class="page">
            <div class="profile-header">
                <div class="avatar-circle">
                    <i class="fas fa-user-tie"></i>
                </div>
                <h2>ហម ម៉ាលីនដា</h2>
                <span class="badge">Developer</span>
            </div>
            
            <div class="container">
                <div class="info-list">
                    <div class="info-tile">
                        <i class="fas fa-id-card"></i>
                        <div class="tile-body">
                            <label>ឈ្មោះអ្នកបង្កើត</label>
                            <p>ហម ម៉ាលីនដា</p>
                        </div>
                    </div>
                    <a href="tel:017751115" class="info-tile">
                        <i class="fas fa-phone-alt"></i>
                        <div class="tile-body">
                            <label>លេខទូរសព្ទ</label>
                            <p>017 751 115</p>
                        </div>
                        <i class="fas fa-chevron-right arrow"></i>
                    </a>
                    <a href="https://t.me/MalindaHorm" target="_blank" class="info-tile">
                        <i class="fab fa-telegram-plane"></i>
                        <div class="tile-body">
                            <label>Telegram</label>
                            <p>t.me/MalindaHorm</p>
                        </div>
                        <i class="fas fa-chevron-right arrow"></i>
                    </a>
                </div>
            </div>
        </section>

        <nav class="nav-bar">
            <button class="nav-btn active" onclick="navigate('home', this)">
                <i class="fas fa-chart-pie"></i>
                <span>ទិន្នន័យ</span>
            </button>
            <button class="nav-btn" onclick="navigate('profile', this)">
                <i class="fas fa-user-circle"></i>
                <span>គណនី</span>
            </button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
